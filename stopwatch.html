<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스톱워치 앱</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-blue-50 to-cyan-100 min-h-screen flex items-center justify-center p-4">
    <!--
    ███████████████████████████████████████████████████
    ██ 🔵 스톱워치 앱의 동작 방식
    ███████████████████████████████████████████████████

    이 앱은 시간을 측정하는 스톱워치입니다.
    버튼을 누르면 시간이 흐르고, 멈추고, 0으로 돌아갑니다.

    화면 구조:
    1. 가운데 흰 카드 안에 전체 내용이 들어있습니다
    2. 맨 위에 크고 굵은 글씨로 시간을 표시합니다 (00:00:00)
    3. 아래에 3개의 버튼이 있습니다 (시작/일시정지, 리셋)
    -->

    <div class="flex items-center justify-center min-h-screen">
        <div class="bg-white rounded-2xl shadow-2xl p-12 w-full max-w-sm">
            <h1 class="text-4xl font-bold text-center text-cyan-600 mb-12">⏱️ 스톱워치</h1>

            <!--
            🟦 시간 표시 영역
            현재 경과 시간을 보여주는 영역입니다.
            → id="display"라는 이름으로 찾아서 시간을 표시합니다.
            시간 형식: 시간:분:초 (예: 01:23:45)
            -->
            <div class="bg-gradient-to-br from-cyan-50 to-blue-50 rounded-xl p-6 mb-8 border-3 border-cyan-200 w-full overflow-hidden">
                <p id="display" class="text-4xl sm:text-5xl md:text-6xl font-mono font-bold text-center text-cyan-700 tracking-wide py-6">
                    00:00:00
                </p>
            </div>

            <!--
            🟦 버튼 영역
            시작/일시정지 버튼과 리셋 버튼이 있습니다.
            → startBtn: 시작/일시정지를 반복하는 버튼
            → resetBtn: 시간을 0으로 돌리는 버튼
            -->
            <div class="flex gap-4 mb-6">
                <button
                    id="startBtn"
                    class="flex-1 bg-green-500 hover:bg-green-600 active:bg-green-700 text-white font-bold py-4 px-6 rounded-lg transition duration-200 text-lg"
                >
                    시작
                </button>
                <button
                    id="resetBtn"
                    class="flex-1 bg-red-500 hover:bg-red-600 active:bg-red-700 text-white font-bold py-4 px-6 rounded-lg transition duration-200 text-lg"
                >
                    리셋
                </button>
            </div>

            <!--
            🟦 상태 표시
            현재 스톱워치의 상태를 보여주는 영역입니다.
            (선택사항이지만 사용자 경험을 향상시킵니다)
            -->
            <div id="status" class="text-center text-gray-500 text-sm">
                준비 완료 ⏸️
            </div>
        </div>
    </div>

    <script>
        /*
        ███████████████████████████████████████████████████
        ██ 🟢 JavaScript (앱을 움직이게 하는 부분)
        ███████████████████████████████████████████████████

        이 부분에서 스톱워치를 동작시킵니다.
        코드는 총 6단계로 나뉩니다.
        */

        // ─────────────────────────────────────────────────
        // 🔴 1단계: 준비 작업
        // ─────────────────────────────────────────────────
        // 핵심: HTML에서 필요한 영역들을 찾아서 이름을 붙여줍니다.

        const display = document.getElementById('display');
        const startBtn = document.getElementById('startBtn');
        const resetBtn = document.getElementById('resetBtn');
        const status = document.getElementById('status');

        // 📌 스톱워치가 작동하는지 안 하는지를 나타내는 변수입니다.
        // true = 작동 중, false = 멈춤
        let isRunning = false;

        // 📌 흘러간 시간을 밀리초(ms) 단위로 저장합니다.
        // 1초 = 1000 밀리초
        let elapsedTime = 0;

        // 📌 스톱워치를 동작시키는 타이머입니다.
        // 이것이 계속 실행되면서 시간을 업데이트합니다.
        let timerInterval = null;

        // 📌 마지막으로 시작한 시간을 저장합니다.
        // 일시정지했다가 다시 시작할 때 필요합니다.
        let lastStartTime = null;

        // ─────────────────────────────────────────────────
        // 🔴 2단계: 시간을 화면에 표시하는 함수
        // ─────────────────────────────────────────────────
        // 📌 핵심: updateDisplay라는 작업을 정의합니다.
        // elapsedTime을 (시간:분:초) 형식으로 바꿔서 화면에 보여줍니다.

        function updateDisplay() {
            // 1️⃣ 밀리초를 초 단위로 변환합니다.
            const totalSeconds = Math.floor(elapsedTime / 1000);

            // 2️⃣ 초를 시간, 분, 초로 나눕니다.
            const hours = Math.floor(totalSeconds / 3600);      // 3600초 = 1시간
            const minutes = Math.floor((totalSeconds % 3600) / 60); // 남은 초를 분으로
            const seconds = totalSeconds % 60;                  // 마지막 남은 초

            // 3️⃣ 📌 핵심 로직: 각 숫자를 2자리로 표현합니다.
            // 예: 5 → "05", 12 → "12"
            const formattedTime = `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;

            // 4️⃣ 화면에 시간을 표시합니다.
            display.textContent = formattedTime;
        }

        // ─────────────────────────────────────────────────
        // 🔴 3단계: 시간을 매초 업데이트하는 함수
        // ─────────────────────────────────────────────────
        // 📌 핵심: startTimer라는 작업을 정의합니다.
        // 이 작업은 스톱워치를 시작합니다.

        function startTimer() {
            // 1️⃣ 현재 시간을 저장합니다.
            // 이것은 지나간 시간을 정확히 계산하기 위해 필요합니다.
            lastStartTime = Date.now();

            // 2️⃣ 📌 핵심 로직: 매 10밀리초마다 이 작업을 반복합니다.
            // (약간의 딜레이를 주어 화면이 너무 자주 업데이트되지 않게 합니다)
            timerInterval = setInterval(() => {
                // 현재 시간을 구합니다.
                const currentTime = Date.now();

                // 마지막 시작 이후로 얼마나 시간이 흘렀는지 계산합니다.
                const timePassed = currentTime - lastStartTime;

                // 이전에 저장된 시간에 새로 지난 시간을 더합니다.
                elapsedTime += timePassed;

                // 다음 계산을 위해 현재 시간을 저장합니다.
                lastStartTime = currentTime;

                // 화면을 업데이트합니다.
                updateDisplay();
            }, 10);
        }

        // ─────────────────────────────────────────────────
        // 🔴 4단계: 스톱워치를 멈추는 함수
        // ─────────────────────────────────────────────────
        // 📌 핵심: stopTimer라는 작업을 정의합니다.
        // 이 작업은 스톱워치를 일시정지합니다.

        function stopTimer() {
            // 📌 핵심 로직: setInterval로 시작한 타이머를 멈춥니다.
            clearInterval(timerInterval);

            // 타이머가 없다는 것을 표시합니다.
            timerInterval = null;
        }

        // ─────────────────────────────────────────────────
        // 🔴 5단계: 시작/일시정지 버튼 누르기
        // ─────────────────────────────────────────────────
        // 📌 핵심: 버튼을 누르면 시작과 일시정지가 반복됩니다.

        startBtn.addEventListener('click', () => {
            // 📌 핵심 로직: isRunning 값에 따라 다르게 작동합니다.
            if (isRunning) {
                // 🔸 현재 작동 중이면 멈춥니다.
                stopTimer();
                isRunning = false;
                startBtn.textContent = '시작';
                startBtn.className = 'flex-1 bg-green-500 hover:bg-green-600 active:bg-green-700 text-white font-bold py-4 px-6 rounded-lg transition duration-200 text-lg';
                status.textContent = '일시정지 중 ⏸️';
            } else {
                // 🔸 현재 멈춰있으면 시작합니다.
                startTimer();
                isRunning = true;
                startBtn.textContent = '일시정지';
                startBtn.className = 'flex-1 bg-yellow-500 hover:bg-yellow-600 active:bg-yellow-700 text-white font-bold py-4 px-6 rounded-lg transition duration-200 text-lg';
                status.textContent = '작동 중 ▶️';
            }
        });

        // ─────────────────────────────────────────────────
        // 🔴 6단계: 리셋 버튼 누르기
        // ─────────────────────────────────────────────────
        // 📌 핵심: 리셋 버튼을 누르면 모든 것이 0으로 돌아갑니다.

        resetBtn.addEventListener('click', () => {
            // 1️⃣ 타이머가 작동 중이면 멈춥니다.
            if (isRunning) {
                stopTimer();
                isRunning = false;
            }

            // 2️⃣ 📌 핵심 로직: 모든 값을 초기 상태로 되돌립니다.
            elapsedTime = 0;
            lastStartTime = null;
            timerInterval = null;

            // 3️⃣ 화면을 업데이트합니다.
            updateDisplay();

            // 4️⃣ 버튼을 초기 상태로 돌립니다.
            startBtn.textContent = '시작';
            startBtn.className = 'flex-1 bg-green-500 hover:bg-green-600 active:bg-green-700 text-white font-bold py-4 px-6 rounded-lg transition duration-200 text-lg';

            // 5️⃣ 상태를 표시합니다.
            status.textContent = '준비 완료 ⏸️';
        });

        // ─────────────────────────────────────────────────
        // 🔴 7단계: 처음 화면 표시
        // ─────────────────────────────────────────────────

        // 📌 페이지를 열었을 때 시간을 한 번 표시합니다.
        updateDisplay();
    </script>
</body>
</html>
